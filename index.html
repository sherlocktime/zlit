<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Slit Panorama Studio</title>

    <style>
      body {
        margin: 0;
        background: #121212;
        color: #e0e0e0;
        font-family: system-ui, -apple-system, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        padding: 15px;
        box-sizing: border-box;
        min-height: 100vh;
      }

      h2 {
        margin: 0;
        font-weight: 400;
        letter-spacing: 1px;
        font-size: 1.4rem;
      }

      /* Sistema de Vistas */
      .view {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        width: 100%;
      }

      .hidden {
        display: none !important;
      }

      /* --- MODO CAPTURA --- */
      .video-container {
        position: relative;
        width: 45vw;
        max-width: 220px;
        border: 2px solid #333;
        border-radius: 6px;
        overflow: hidden;
        display: flex;
        background: #000;
      }

      video {
        width: 100%;
        height: auto;
        display: block;
      }

      .slit-guide {
        position: absolute;
        top: 0;
        bottom: 0;
        left: 50%;
        width: 2px;
        background-color: #ff3b30;
        transform: translateX(-50%);
        box-shadow: 0 0 6px #ff3b30;
        pointer-events: none;
        display: none;
      }

      .scanning .slit-guide {
        display: block;
        animation: pulse 1s infinite;
      }

      @keyframes pulse {
        0% { opacity: 0.4; }
        50% { opacity: 1; }
        100% { opacity: 0.4; }
      }

      .controls {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: center;
      }

      button {
        padding: 8px 16px;
        border: none;
        border-radius: 5px;
        background-color: #2c2c2e;
        color: white;
        font-weight: bold;
        font-size: 0.9rem;
        cursor: pointer;
        transition: background 0.2s;
      }

      button:hover { background-color: #3a3a3c; }
      #startBtn { background-color: #34c759; color: black; }
      #startBtn:hover { background-color: #2cd052; }
      #stopBtn { background-color: #ff3b30; }
      #stopBtn:hover { background-color: #ff453a; }
      #viewBtn { background-color: #007aff; }
      #viewBtn:hover { background-color: #0a84ff; }

      .status-panel {
        font-size: 0.85rem;
        color: #aaa;
        text-align: center;
        width: 90vw;
        max-width: 500px;
      }

      .progress-bar {
        width: 100%;
        height: 5px;
        background-color: #222;
        border-radius: 3px;
        overflow: hidden;
      }

      #progress {
        width: 0%;
        height: 100%;
        background-color: #007aff;
        transition: width 0.1s linear;
      }

      canvas {
        width: 95vw;
        max-width: 600px;
        height: auto;
        border: 2px solid #444;
        background: black;
        border-radius: 6px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.6);
      }

      /* --- MODO VISOR CILÍNDRICO --- */
      /* Este contenedor actúa como la "ventana" fija por donde mirás */
      .viewer-container {
        width: 95vw;
        max-width: 600px;
        height: 300px;
        border: 2px solid #555;
        border-radius: 8px;
        overflow: hidden;
        position: relative;
        background: #050505;
        cursor: grab;
      }
      
      .viewer-container:active {
        cursor: grabbing;
      }

      /* El lienzo interno que se mueve infinitamente */
      #viewerCanvas {
        position: absolute;
        top: 0;
        left: 0;
        height: 100%;
        width: auto; /* Mantiene la proporción */
      }
    </style>
  </head>
  <body>

    <div id="captureView" class="view">
      <h2>Panorama Slit Scan</h2>

      <div class="video-container" id="videoWrapper">
        <video id="video" autoplay playsinline muted></video>
        <div class="slit-guide"></div>
      </div>

      <div class="controls">
        <button id="startBtn">Iniciar</button>
        <button id="stopBtn">Detener</button>
        <button id="viewBtn">Visor/button>
        <button id="saveBtn">Guardar PNG</button>
      </div>

      <div class="status-panel">
        <span id="statusTxt">Cargando cámara...</span>
        <div class="progress-bar" style="margin-top: 6px;">
          <div id="progress"></div>
        </div>
      </div>

      <canvas id="panorama" width="4000" height="400"></canvas>
    </div>

    <div id="statusView" class="view hidden">
      <h2>Visor Cilíndrico Loop</h2>
      
      <div class="controls">
        <button id="backBtn">⬅ Volver a Captura</button>
      </div>

      <div class="viewer-container" id="viewerContainer">
        <canvas id="viewerCanvas"></canvas>
      </div>
      
      <p style="font-size: 0.85rem; color: #888; text-align: center; margin: 0;">
        Arrastrá con el mouse o el dedo para girar manualmente.
      </p>
    </div>

    <script>
      // Elementos de captura
      const video = document.getElementById("video");
      const videoWrapper = document.getElementById("videoWrapper");
      const pano = document.getElementById("panorama");
      const ctx = pano.getContext("2d");
      const statusTxt = document.getElementById("statusTxt");
      const progress = document.getElementById("progress");

      // Vistas
      const captureView = document.getElementById("captureView");
      const statusView = document.getElementById("statusView");

      // Elementos del Visor
      const viewerContainer = document.getElementById("viewerContainer");
      const viewerCanvas = document.getElementById("viewerCanvas");
      const vCtx = viewerCanvas.getContext("2d");

      const tempCanvas = document.createElement("canvas");
      const tempCtx = tempCanvas.getContext("2d");

      let running = false;
      let xpos = 0;
      const SLICE_WIDTH = 4;

      // Variables de animación del visor
      let viewerRunning = false;
      let scrollOffset = 0; 
      let scrollSpeed = 1.5; // Velocidad del giro automático
      let isDragging = false;
      let startX = 0;

      async function startCamera() {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "environment" },
          });
          video.srcObject = stream;

          video.onloadedmetadata = () => {
            tempCanvas.width = video.videoWidth;
            tempCanvas.height = video.videoHeight;
            pano.height = video.videoHeight;

            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, pano.width, pano.height);
            statusTxt.innerText = "Cámara lista.";
          };
        } catch (err) {
          statusTxt.innerText = "Error de cámara: " + err.message;
        }
      }

      function captureSlice() {
        if (!running) return;

        tempCtx.drawImage(video, 0, 0, tempCanvas.width, tempCanvas.height);
        const centerX = Math.floor(tempCanvas.width / 2 - SLICE_WIDTH / 2);

        ctx.drawImage(
          tempCanvas,
          centerX, 0, SLICE_WIDTH, tempCanvas.height,
          xpos, 0, SLICE_WIDTH, pano.height
        );

        xpos += SLICE_WIDTH;
        
        const percent = (xpos / pano.width) * 100;
        progress.style.width = `${percent}%`;

        if (xpos >= pano.width) {
          running = false;
          videoWrapper.classList.remove("scanning");
          statusTxt.innerText = "¡Completado!";
          return;
        }

        requestAnimationFrame(captureSlice);
      }

      // --- CONTROLES DE CAPTURA ---
      document.getElementById("startBtn").onclick = () => {
        if (!video.videoWidth) return;
        if (xpos >= pano.width || !running) {
          if (xpos >= pano.width) {
            xpos = 0;
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, pano.width, pano.height);
          }
          running = true;
          videoWrapper.classList.add("scanning");
          statusTxt.innerText = "Escaneando...";
          captureSlice();
        }
      };

      document.getElementById("stopBtn").onclick = () => {
        running = false;
        videoWrapper.classList.remove("scanning");
        statusTxt.innerText = "Pausado.";
      };

      // MEJORA 1: GUARDAR CON NOMBRE ÚNICO (CON LA HORA)
      document.getElementById("saveBtn").onclick = () => {
        const ahora = new Date();
        const año = ahora.getFullYear();
        // padStart asegura que siempre tengan 2 dígitos (ej: "05" en vez de "5")
        const mes = String(ahora.getMonth() + 1).padStart(2, '0');
        const dia = String(ahora.getDate()).padStart(2, '0');
        const horas = String(ahora.getHours()).padStart(2, '0');
        const minutos = String(ahora.getMinutes()).padStart(2, '0');
        const segundos = String(ahora.getSeconds()).padStart(2, '0');

        const nombreArchivo = `panorama_${año}${mes}${dia}_${horas}${minutos}${segundos}.png`;

        const a = document.createElement("a");
        a.href = pano.toDataURL("image/png");
        a.download = nombreArchivo;
        a.click();
      };

      // --- MEJORA 2: LÓGICA DEL VISOR CILÍNDRICO ---
      document.getElementById("viewBtn").onclick = () => {
        // Pausar captura
        running = false;
        videoWrapper.classList.remove("scanning");

        // Intercambiar vistas
        captureView.classList.add("hidden");
        statusView.classList.remove("hidden");

        // Configurar el tamaño del canvas del visor
        viewerCanvas.height = viewerContainer.clientHeight;
        // Calculamos el ancho proporcional respecto a lo que se haya escaneado
        const aspect = pano.width / pano.height;
        viewerCanvas.width = viewerCanvas.height * aspect;

        viewerRunning = true;
        animateViewer();
      };

      document.getElementById("backBtn").onclick = () => {
        viewerRunning = false;
        statusView.classList.add("hidden");
        captureView.classList.remove("hidden");
      };

      function animateViewer() {
        if (!viewerRunning) return;

        vCtx.clearRect(0, 0, viewerCanvas.width, viewerCanvas.height);

        // Si no se está arrastrando, se mueve solo
        if (!isDragging) {
          scrollOffset -= scrollSpeed;
        }

        // Efecto Matemático de Bucle Cilíndrico Infinito:
        // Normalizamos el desplazamiento para que nunca pase del ancho del lienzo
        const w = viewerCanvas.width;
        scrollOffset = ((scrollOffset % w) + w) % w;

        // Dibujamos la imagen original dos veces continuas para tapar el "corte"
        vCtx.drawImage(pano, scrollOffset - w, 0, w, viewerCanvas.height);
        vCtx.drawImage(pano, scrollOffset, 0, w, viewerCanvas.height);

        requestAnimationFrame(animateViewer);
      }

      // --- AGARRE Y ARRASTRE DEL VISOR (Mouse y Pantalla Táctil) ---
      function dragStart(e) {
        isDragging = true;
        startX = (e.pageX || e.touches[0].pageX) - scrollOffset;
      }

      function dragMove(e) {
        if (!isDragging) return;
        e.preventDefault();
        const x = e.pageX || e.touches[0].pageX;
        scrollOffset = x - startX;
      }

      function dragEnd() {
        isDragging = false;
      }

      // Eventos de Mouse
      viewerContainer.addEventListener('mousedown', dragStart);
      window.addEventListener('mousemove', dragMove);
      window.addEventListener('mouseup', dragEnd);

      // Eventos de Celular (Touch)
      viewerContainer.addEventListener('touchstart', dragStart, {passive: false});
      window.addEventListener('touchmove', dragMove, {passive: false});
      window.addEventListener('touchend', dragEnd);

      startCamera();
    </script>
  </body>
</html>
