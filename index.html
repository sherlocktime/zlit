<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rendija Slit Scan</title>

    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#121212" />
    <link rel="apple-touch-icon" href="icon-192.png" />

    <style>
      body { margin: 0; background: #121212; color: #e0e0e0; font-family: system-ui, -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 15px; box-sizing: border-box; min-height: 100vh; }
      h2 { margin: 0; font-weight: 400; letter-spacing: 1px; font-size: 1.4rem; }
      .video-container { position: relative; width: 45vw; max-width: 220px; border: 2px solid #333; border-radius: 6px; overflow: hidden; display: flex; background: #000; }
      video { width: 100%; height: auto; display: block; }
      .slit-guide { position: absolute; top: 0; bottom: 0; left: 50%; width: 2px; background-color: #ff3b30; transform: translateX(-50%); box-shadow: 0 0 6px #ff3b30; pointer-events: none; display: none; }
      .scanning .slit-guide { display: block; animation: pulse 1s infinite; }
      @keyframes pulse { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }
      .controls { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
      button { padding: 8px 16px; border: none; border-radius: 5px; background-color: #2c2c2e; color: white; font-weight: bold; font-size: 0.9rem; cursor: pointer; transition: background 0.2s; }
      button:active { opacity: 0.7; }
      #toggleBtn { background-color: #34c759; color: black; }
      #toggleBtn.running { background-color: #ff3b30; color: white; }
      #toggleBtn.running:hover { background-color: #ff453a; }
      #speedBtn { background-color: #ff9500; color: black; }
      #saveBtn { background-color: #7a4fc5; color: black; }
      .status-panel { font-size: 0.85rem; color: #aaa; text-align: center; width: 90vw; max-width: 500px; }
      .progress-bar { width: 100%; height: 5px; background-color: #222; border-radius: 3px; overflow: hidden; }
      #progress { width: 0%; height: 100%; background-color: #007aff; transition: width 0.1s linear; }
      canvas { width: 95vw; max-width: 600px; height: auto; border: 2px solid #444; background: black; border-radius: 6px; box-shadow: 0 4px 15px rgba(0,0,0,0.6); }
    </style>
</head>

<body>

    <h2>Rendija Slit Scan</h2>

    <div class="video-container" id="videoWrapper">
        <video id="video" autoplay playsinline muted></video>
        <div class="slit-guide"></div>
    </div>

<div class="controls">
    <button id="toggleBtn">Iniciar</button>
    <button id="speedBtn">4 px</button>
    <button id="stabBtn" style="background-color: #007aff; color: white;">Estable</button>
    <button id="saveBtn">Guardar</button>
</div>

    <div class="status-panel">
        <span id="statusTxt">Cargando cámara...</span>
        <div class="progress-bar" style="margin-top: 6px;">
            <div id="progress"></div>
        </div>
    </div>

    <canvas id="panorama" width="4000" height="400"></canvas>

    <script>
        const video = document.getElementById("video");
        const videoWrapper = document.getElementById("videoWrapper");
        const pano = document.getElementById("panorama");
        const ctx = pano.getContext("2d", { alpha: false });
        const statusTxt = document.getElementById("statusTxt");
        const progress = document.getElementById("progress");
        const speedBtn = document.getElementById("speedBtn");
        const toggleBtn = document.getElementById("toggleBtn");
        const stabBtn = document.getElementById("stabBtn");

        let running = false;
        let xpos = 0;

        const speeds = [1, 2, 4, 8, 16];
        let speedIndex = 2; // 4 pixeles
        let sliceWidth = speeds[speedIndex];

        // --- VARIABLES PARA ESTABILIZACIÓN ---
        let stabilizing = true;
        let lastSliceData = null; 
        const verticalMargin = 40; 
        let accumulatedY = verticalMargin;
        const springFactor = 0.05; 

        // Canvas oculto para extraer los píxeles de la tira de video actual -estabilización-
        const hiddenCanvas = document.createElement("canvas");
        const hiddenCtx = hiddenCanvas.getContext("2d", { alpha: false, willReadFrequently: true });

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: "environment",
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    },
                });
                video.srcObject = stream;

                video.onloadedmetadata = () => {
                    pano.height = video.videoHeight;
                    ctx.fillStyle = "black";
                    ctx.fillRect(0, 0, pano.width, pano.height);
                    
                    hiddenCanvas.height = video.videoHeight;

                    statusTxt.innerText = "Cámara lista.";
                };
            } catch (err) {
                statusTxt.innerText = "Error de cámara: " + err.message;
            }
        }

         // Algoritmo SAD (Sum of Absolute Differences) para buscar el mejor encaje vertical
        function getVerticalOffset(newData, oldData, width, height) {
            if (!oldData) return 0;

            let bestOffset = 0;
            let minDifference = Infinity;
            const searchRange = 10;
            
            const xCoord = 0; 

            for (let offset = -searchRange; offset <= searchRange; offset++) {
                let currentDifference = 0;

                for (let y = searchRange; y < height - searchRange; y += 3) {
                    const currentIdx = (y * width + xCoord) * 4;
                    const oldIdx = ((y + offset) * width + xCoord) * 4;

                    // Comparamos el canal Verde [idx + 1], que es el que tiene más detalle y menos ruido
                    const diff = Math.abs(newData[currentIdx + 1] - oldData[oldIdx + 1]);
                    currentDifference += diff;
                }

                if (currentDifference < minDifference) {
                    minDifference = currentDifference;
                    bestOffset = offset;
                }
            }

            return bestOffset;
        }

        function captureSlice() {
            if (!running) return;

            const centerX = Math.floor(video.videoWidth / 2 - sliceWidth / 2);

            // 1. Dibujar la tira actual en el canvas oculto
            hiddenCanvas.width = sliceWidth;
            hiddenCtx.drawImage(video, centerX, 0, sliceWidth, video.videoHeight, 0, 0, sliceWidth, video.videoHeight);
            const currentSliceImageData = hiddenCtx.getImageData(0, 0, sliceWidth, video.videoHeight);

            // 2. Aplicar estabilización condicional con límites centrados
            if (stabilizing) {
                const offset = getVerticalOffset(currentSliceImageData.data, lastSliceData, sliceWidth, video.videoHeight);
                accumulatedY += offset;
                accumulatedY += (verticalMargin - accumulatedY) * springFactor;
                if (accumulatedY < 0) accumulatedY = 0;
                if (accumulatedY > verticalMargin * 2) accumulatedY = verticalMargin * 2;
            } else { accumulatedY = verticalMargin; }

            // 3. Guardar la tira actual para la próxima comparación
            lastSliceData = currentSliceImageData.data;

            // 4. Dibujar en el canvas principal aplicando el desplazamiento Y corregido
            ctx.drawImage(
                hiddenCanvas,
                0, 0, sliceWidth, video.videoHeight,
                xpos, accumulatedY, sliceWidth, pano.height - (verticalMargin * 2)
            );

            xpos += sliceWidth;

            const percent = (xpos / pano.width) * 100;
            progress.style.width = `${percent}%`;

            if (xpos >= pano.width) {
                running = false;
                videoWrapper.classList.remove("scanning");
                statusTxt.innerText = "¡Completado!";
                toggleBtn.innerText = "Iniciar";
                toggleBtn.classList.remove("running");
                hacerRuido();
                return;
            }

            requestAnimationFrame(captureSlice);
        }

        toggleBtn.onclick = () => {
            if (!video.videoWidth) return;

            if (running) {
                running = false;
                videoWrapper.classList.remove("scanning");
                statusTxt.innerText = "Pausado.";
                toggleBtn.innerText = "Reanudar";
                toggleBtn.classList.remove("running");
                return;
            }

            if (xpos >= pano.width) {
                xpos = 0;
                accumulatedY = verticalMargin;
                lastSliceData = null;
                progress.style.width = "0%";
                ctx.fillStyle = "black";
                ctx.fillRect(0, 0, pano.width, pano.height);
            }

            running = true;
            videoWrapper.classList.add("scanning");
            statusTxt.innerText = "Escaneando...";
            toggleBtn.innerText = "Pausar";
            toggleBtn.classList.add("running");

            captureSlice();
        };

        speedBtn.onclick = () => {
            speedIndex = (speedIndex + 1) % speeds.length;
            sliceWidth = speeds[speedIndex];
            speedBtn.innerText = `${sliceWidth} px`;
            lastSliceData = null; 
        };

        stabBtn.onclick = () => {
            stabilizing = !stabilizing;
            if (stabilizing) {
                stabBtn.innerText = "Estable";
                stabBtn.style.backgroundColor = "#007aff";
            } else {
                stabBtn.innerText = "Crudo";
                stabBtn.style.backgroundColor = "#48484a";
                accumulatedY = verticalMargin;
                lastSliceData = null;
            }
        };

        document.getElementById("saveBtn").onclick = () => {
            const timestamp = () =>
                new Date().toISOString().replace(/[-:]/g, "").replace("T", "_").slice(0, 15);

            const nombreArchivo = `panorama_${timestamp()}.jpg`;

            const a = document.createElement("a");
            a.href = pano.toDataURL("image/jpeg", 0.92);
            a.download = nombreArchivo;
            a.click();
        };

        function hacerRuido() {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(587.33, audioCtx.currentTime);
            oscillator.frequency.setValueAtTime(880.00, audioCtx.currentTime + 0.1);
            gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
            oscillator.start(audioCtx.currentTime);
            oscillator.stop(audioCtx.currentTime + 0.3);
        }

        startCamera();
    </script>
</body>

</html>
