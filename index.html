<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Slit Panorama Studio Pro</title>

    <style>
      body { margin: 0; background: #121212; color: #e0e0e0; font-family: system-ui, -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 15px; box-sizing: border-box; min-height: 100vh; }
      h2 { margin: 0; font-weight: 400; letter-spacing: 1px; font-size: 1.4rem; }
      .video-container { position: relative; width: 45vw; max-width: 220px; border: 2px solid #333; border-radius: 6px; overflow: hidden; display: flex; background: #000; }
      video { width: 100%; height: auto; display: block; }
      .slit-guide { position: absolute; top: 0; bottom: 0; left: 50%; width: 2px; background-color: #ff3b30; transform: translateX(-50%); box-shadow: 0 0 6px #ff3b30; pointer-events: none; display: none; }
      .scanning .slit-guide { display: block; animation: pulse 1s infinite; }
      @keyframes pulse { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }
      .controls { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
      button { padding: 8px 16px; border: none; border-radius: 5px; background-color: #2c2c2e; color: white; font-weight: bold; font-size: 0.9rem; cursor: pointer; transition: background 0.2s; }
      button:hover { background-color: #3a3a3c; }
      #startBtn { background-color: #34c759; color: black; }
      #startBtn:hover { background-color: #2cd052; }
      #stopBtn { background-color: #ff3b30; }
      #stopBtn:hover { background-color: #ff453a; }
      #switchBtn { background-color: #007aff; }
      #switchBtn:hover { background-color: #0a84ff; }
      .status-panel { font-size: 0.85rem; color: #aaa; text-align: center; width: 90vw; max-width: 500px; }
      .progress-bar { width: 100%; height: 5px; background-color: #222; border-radius: 3px; overflow: hidden; }
      #progress { width: 0%; height: 100%; background-color: #007aff; transition: width 0.05s linear; }
      canvas { width: 95vw; max-width: 600px; height: auto; border: 2px solid #444; background: black; border-radius: 6px; box-shadow: 0 4px 15px rgba(0,0,0,0.6); }
    </style>
  </head>
  <body>

    <h2>Panorama Slit Scan</h2>

    <div class="video-container" id="videoWrapper">
      <video id="video" autoplay playsinline muted></video>
      <div class="slit-guide"></div>
    </div>

    <div class="controls">
      <button id="startBtn">Iniciar</button>
      <button id="stopBtn">Detener</button>
      <button id="switchBtn">Cámara</button>
      <button id="saveBtn">Guardar</button>
    </div>

    <div class="status-panel">
      <span id="statusTxt">Cargando cámara...</span>
      <div class="progress-bar" style="margin-top: 6px;">
        <div id="progress"></div>
      </div>
    </div>

    <canvas id="panorama" width="4000" height="400"></canvas>

    <script>
      const video = document.getElementById("video");
      const videoWrapper = document.getElementById("videoWrapper");
      const pano = document.getElementById("panorama");
      const ctx = pano.getContext("2d", { alpha: false }); // Optimización: Desactivar canal alpha en el canvas
      const statusTxt = document.getElementById("statusTxt");
      const progress = document.getElementById("progress");

      let running = false;
      let xpos = 0;
      
      // OPTIMIZACIÓN 1: Reducir el grosor de la rebanada a 1 píxel para máxima fluidez
      const SLICE_WIDTH = 1; 

      let currentStream = null;
      let videoDevices = [];
      let currentDeviceIndex = 0;

      function stopCurrentStream() {
        if (currentStream) {
          currentStream.getTracks().forEach(track => track.stop());
        }
      }

      async function initCamera() {
        stopCurrentStream();
        statusTxt.innerText = "Conectando cámara...";

        if (videoDevices.length === 0) {
          try {
            const initialStream = await navigator.mediaDevices.getUserMedia({ video: true });
            initialStream.getTracks().forEach(track => track.stop());
            
            const devices = await navigator.mediaDevices.enumerateDevices();
            videoDevices = devices.filter(device => device.kind === 'videoinput');
            
            const backCamIndex = videoDevices.findIndex(d => d.label.toLowerCase().includes('back') || d.label.toLowerCase().includes('ambiente'));
            if (backCamIndex !== -1) currentDeviceIndex = backCamIndex;
          } catch (err) {
            statusTxt.innerText = "Permiso denegado: " + err.message;
            return;
          }
        }

        if (videoDevices.length === 0) {
          statusTxt.innerText = "No se detectaron cámaras.";
          return;
        }

        const deviceId = videoDevices[currentDeviceIndex].deviceId;

        try {
          // OPTIMIZACIÓN 2: Pedir resoluciones estándar (720p). 1080p o más destruye el rendimiento en web móviles.
          currentStream = await navigator.mediaDevices.getUserMedia({
            video: { 
              deviceId: deviceId ? { exact: deviceId } : undefined,
              width: { ideal: 1280 },
              height: { ideal: 720 },
              frameRate: { ideal: 60 } // Intentar capturar a 60fps si el dispositivo lo permite
            }
          });
          
          video.srcObject = currentStream;

          video.onloadedmetadata = () => {
            pano.height = video.videoHeight;
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, pano.width, pano.height);
            statusTxt.innerText = `Cámara lista: ${videoDevices[currentDeviceIndex].label || 'Cámara ' + (currentDeviceIndex + 1)}`;
          };
        } catch (err) {
          statusTxt.innerText = "Error al abrir cámara: " + err.message;
        }
      }

      function captureSlice() {
        if (!running) return;

        // OPTIMIZACIÓN 3: Pintar DIRECTAMENTE desde el elemento Video (sin pasar por un tempCanvas)
        const centerX = Math.floor(video.videoWidth / 2 - SLICE_WIDTH / 2);

        ctx.drawImage(
          video,
          centerX, 0, SLICE_WIDTH, video.videoHeight, // Recorte del centro del video
          xpos, 0, SLICE_WIDTH, pano.height          // Dibujo en el canvas principal
        );

        xpos += SLICE_WIDTH;
        
        const percent = (xpos / pano.width) * 100;
        progress.style.width = `${percent}%`;

        if (xpos >= pano.width) {
          running = false;
          videoWrapper.classList.remove("scanning");
          statusTxt.innerText = "¡Completado!";
          return;
        }

        requestAnimationFrame(captureSlice);
      }

      // --- CONTROLES ---
      document.getElementById("startBtn").onclick = () => {
        if (!video.videoWidth) return;
        if (xpos >= pano.width || !running) {
          if (xpos >= pano.width) {
            xpos = 0;
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, pano.width, pano.height);
          }
          running = true;
          videoWrapper.classList.add("scanning");
          statusTxt.innerText = "Escaneando...";
          captureSlice();
        }
      };

      document.getElementById("stopBtn").onclick = () => {
        running = false;
        videoWrapper.classList.remove("scanning");
        statusTxt.innerText = "Pausado.";
      };

      document.getElementById("switchBtn").onclick = () => {
        if (videoDevices.length <= 1) {
          statusTxt.innerText = "No hay más cámaras.";
          return;
        }
        running = false;
        videoWrapper.classList.remove("scanning");
        currentDeviceIndex = (currentDeviceIndex + 1) % videoDevices.length;
        initCamera();
      };

      document.getElementById("saveBtn").onclick = () => {
        const ahora = new Date();
        const nombreArchivo = `panorama_${ahora.toISOString().replace(/[:.]/g, "-")}.png`;
        const a = document.createElement("a");
        a.href = pano.toDataURL("image/png");
        a.download = nombreArchivo;
        a.click();
      };

      initCamera();
    </script>
  </body>
</html>
